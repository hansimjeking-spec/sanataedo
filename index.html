<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>생태도 자원 맵</title>
<style>
:root{--bg:#f5f7f8;--panel:#fff;--soft:#edf3f5;--line:#d7e0e4;--ink:#1d2a2f;--muted:#66757c;--teal:#0b7a75;--green:#4f813f;--blue:#2f6f9f;--gold:#b38319;--red:#b94444;--violet:#7d5a9f;--rust:#b75b2a}*{box-sizing:border-box}body{margin:0;font-family:"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;color:var(--ink);background:var(--bg)}button,input,select,textarea{font:inherit}button{cursor:pointer;border:0}.app{min-height:100vh;display:grid;grid-template-columns:300px minmax(440px,1fr)340px;grid-template-rows:64px 1fr}header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 18px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.92)}.brand{display:flex;align-items:center;gap:12px}.mark{width:38px;height:38px;border-radius:8px;background:radial-gradient(circle at center,#fff 0 17%,transparent 18%),conic-gradient(from 20deg,var(--teal),var(--green),var(--gold),var(--rust),var(--blue),var(--teal))}h1{font-size:18px;margin:0}.sub{font-size:12px;color:var(--muted);margin-top:3px}.actions{display:flex;gap:8px}.btn{min-height:36px;border-radius:8px;background:var(--soft);color:var(--ink);padding:0 11px;display:inline-flex;align-items:center;justify-content:center}.btn.primary{background:var(--teal);color:#fff}.icon{width:38px;padding:0;font-size:17px}aside{overflow:auto;background:rgba(255,255,255,.78);padding:16px}.left{border-right:1px solid var(--line)}.right{border-left:1px solid var(--line)}.section{margin-bottom:18px}.section-title{font-size:13px;font-weight:800;color:#344348;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between}.palette{display:grid;grid-template-columns:1fr 1fr;gap:8px}.palette button,.person{border:1px solid var(--line);border-radius:8px;background:#fff;text-align:left;min-height:48px;padding:8px 9px}.palette strong{display:block;font-size:13px}.palette span,.meta{font-size:11px;color:var(--muted)}.people{display:grid;gap:8px}.person{display:grid;grid-template-columns:10px 1fr auto;gap:9px;align-items:center;width:100%}.person.active{border-color:rgba(11,122,117,.65);box-shadow:0 0 0 3px rgba(11,122,117,.1)}.dot{width:10px;height:10px;border-radius:50%}.name{display:block;font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.badge{min-width:24px;height:22px;border-radius:999px;background:var(--soft);font-size:11px;color:var(--muted);display:inline-flex;align-items:center;justify-content:center}.stage{position:relative;overflow:hidden;background:linear-gradient(90deg,rgba(215,224,228,.8) 1px,transparent 1px),linear-gradient(180deg,rgba(215,224,228,.8) 1px,transparent 1px),#fafdfe;background-size:32px 32px}svg{width:100%;height:100%;display:block;touch-action:none}.link{fill:none;stroke-width:4;stroke-linecap:round;opacity:.8}.strong{stroke:var(--green)}.normal{stroke:#79939b;stroke-width:3}.weak{stroke:var(--gold);stroke-width:2.5;stroke-dasharray:7 8}.stress{stroke:var(--red);stroke-dasharray:3 7}.node{filter:drop-shadow(0 9px 18px rgba(31,51,58,.16));cursor:grab}.node circle{stroke:#fff;stroke-width:5}.node .ring{fill:none;stroke:rgba(11,122,117,.65);stroke-width:3;opacity:0}.node.selected .ring{opacity:1}.node text{fill:#17252a;font-weight:800;font-size:13px;text-anchor:middle;pointer-events:none}.node .type{display:none}.resource-link{fill:none;stroke:#9db4bb;stroke-width:2;stroke-linecap:round;opacity:.7}.resource-node{filter:drop-shadow(0 7px 14px rgba(31,51,58,.12));cursor:pointer}.resource-node circle{fill:#fff;stroke:#2f6f9f;stroke-width:3}.resource-node.risk circle{stroke:var(--red)}.resource-node.warn circle{stroke:var(--gold)}.resource-node text{fill:#17252a;font-weight:800;font-size:11px;text-anchor:middle;pointer-events:none}.chips{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}.chip{border-radius:999px;padding:3px 8px;background:#edf4f2;color:#245b50;border:1px solid #d3e6e1;font-size:11px;font-weight:700}.chip.warn{background:#fbf4df;color:#71530d;border-color:#eedca7}.chip.risk{background:#faecec;color:#7c2f2f;border-color:#efc8c8}.field{display:grid;gap:6px;margin-bottom:10px}label{font-size:12px;font-weight:700;color:var(--muted)}input,select,textarea{width:100%;min-height:36px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:#fff;color:var(--ink)}textarea{min-height:72px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.resource-list{display:grid;gap:8px}.resource{border:1px solid var(--line);border-radius:8px;background:#fff;padding:10px}.resource-top{display:flex;align-items:center;justify-content:space-between;gap:8px}.chip-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}.resource strong{font-size:13px}.resource p{font-size:12px;line-height:1.45;color:var(--muted);margin:7px 0 0}.mini{width:28px;height:28px;border-radius:8px;background:var(--soft);color:var(--muted)}.empty{border:1px dashed #c9d5da;border-radius:8px;padding:14px;background:rgba(255,255,255,.72);color:var(--muted);font-size:13px;line-height:1.5}.legend{position:absolute;left:16px;bottom:16px;display:flex;gap:8px;flex-wrap:wrap;max-width:calc(100% - 32px);padding:8px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.9)}.legend span{font-size:11px;color:var(--muted);display:inline-flex;gap:6px;align-items:center}.sample{width:24px;border-top:3px solid #79939b}.sample.s1{border-color:var(--green);border-top-width:4px}.sample.s2{border-color:var(--gold);border-top-style:dashed}.sample.s3{border-color:var(--red);border-top-style:dotted}.toast{position:absolute;top:16px;left:50%;transform:translateX(-50%);background:#17252a;color:#fff;border-radius:8px;padding:9px 12px;font-size:13px;opacity:0;transition:opacity .18s}.toast.show{opacity:1}@media(max-width:980px){.app{grid-template-columns:1fr;grid-template-rows:64px auto 58vh auto}.left,.right{border:0}.left{border-bottom:1px solid var(--line)}.right{border-top:1px solid var(--line)}.palette{grid-template-columns:repeat(4,minmax(130px,1fr));overflow:auto}.people{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}}@media(max-width:620px){header{height:auto;min-height:64px;align-items:flex-start;flex-direction:column;padding:10px}.actions{width:100%;overflow:auto}.app{grid-template-rows:auto auto 54vh auto}.palette,.row{grid-template-columns:1fr 1fr}.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app"><header><div class="brand"><div class="mark"></div><div><h1>생태도 자원 맵</h1><div class="sub">클라이언트와 주변 인물 각각에 자원을 기록</div></div></div><div class="actions"><button class="btn" id="connectMode">관계 연결</button><button class="btn icon" id="arrange" title="보기 정리">⤢</button><button class="btn icon" id="save" title="저장">⇩</button><label class="btn icon" for="load" title="불러오기">⇧</label><input id="load" type="file" accept="application/json" hidden></div></header><aside class="left"><section class="section"><div class="section-title">인물 추가</div><div class="palette" id="palette"></div></section><section class="section"><div class="section-title"><span>인물 목록</span><button class="mini" id="reset" title="초기화">↺</button></div><div class="people" id="people"></div></section></aside><main class="stage"><svg id="map" viewBox="0 0 1000 720"></svg><div class="legend"><span><i class="sample s1"></i>강한 지지</span><span><i class="sample"></i>일반 관계</span><span><i class="sample s2"></i>약한 관계</span><span><i class="sample s3"></i>갈등/부담</span></div><div class="toast" id="toast"></div></main><aside class="right" id="detail"></aside></div>
<script>
var personTypes={client:{label:'클라이언트',hint:'중심 인물',color:'#0b7a75'},family:{label:'가족',hint:'동거/비동거 가족',color:'#4f813f'},friend:{label:'친구',hint:'친구와 지인',color:'#2f6f9f'},agency:{label:'기관',hint:'학교, 병원, 복지기관',color:'#b38319'},worker:{label:'전문가',hint:'상담사, 담당자',color:'#7d5a9f'},neighbor:{label:'이웃',hint:'지역사회 관계',color:'#b75b2a'}};
var resourceTypes={emotional:{label:'정서',tone:'good'},care:{label:'돌봄',tone:'good'},money:{label:'경제',tone:'good'},info:{label:'정보',tone:'good'},place:{label:'공간',tone:'good'},risk:{label:'위험',tone:'risk'},stress:{label:'부담',tone:'warn'}};
var relationTypes={strong:'강한 지지',normal:'일반 관계',weak:'약한 관계',stress:'갈등/부담'};
var uid=function(){return crypto.randomUUID()};
function initialState(){var motherId=uid(),schoolId=uid(),friendId=uid();return{selectedId:'client',people:[{id:'client',name:'클라이언트',type:'client',note:'중심 인물',x:500,y:360,resources:[{id:uid(),type:'emotional',name:'상담 참여 의지',memo:'개입 목표와 변화 의지를 기록합니다.'}]},{id:motherId,name:'어머니',type:'family',note:'주 보호자',x:320,y:270,resources:[{id:uid(),type:'care',name:'일상 돌봄',memo:'식사, 병원 동행 등 실질 지원'}]},{id:schoolId,name:'학교 상담실',type:'agency',note:'외부 기관',x:690,y:245,resources:[{id:uid(),type:'info',name:'학교생활 정보',memo:'출결, 교우관계, 학업 상황 공유'}]},{id:friendId,name:'친구 민지',type:'friend',note:'또래 지지',x:660,y:490,resources:[{id:uid(),type:'emotional',name:'정서적 지지',memo:'힘든 일을 들어주는 관계'}]}],links:[{id:uid(),from:'client',to:motherId,type:'normal'},{id:uid(),from:'client',to:schoolId,type:'normal'},{id:uid(),from:'client',to:friendId,type:'strong'}]}}
var state=initialState(),connectMode=false,connectStart=null,dragging=null;var svg=document.getElementById('map'),palette=document.getElementById('palette'),people=document.getElementById('people'),detail=document.getElementById('detail'),toast=document.getElementById('toast');
function selectedPerson(){return state.people.find(function(p){return p.id===state.selectedId})||state.people[0]}function render(){renderPalette();renderPeople();renderMap();renderDetail();document.getElementById('connectMode').classList.toggle('primary',connectMode)}
function renderPalette(){palette.innerHTML=Object.keys(personTypes).map(function(type){var i=personTypes[type];return '<button type="button" data-add-person="'+type+'" style="border-left:5px solid '+i.color+'"><strong>'+i.label+'</strong><span>'+i.hint+'</span></button>'}).join('');palette.querySelectorAll('[data-add-person]').forEach(function(b){b.onclick=function(){addPerson(b.dataset.addPerson)}})}
function renderPeople(){people.innerHTML=state.people.map(function(p){return '<button type="button" class="person '+(p.id===state.selectedId?'active':'')+'" data-select="'+p.id+'"><span class="dot" style="background:'+(personTypes[p.type]?personTypes[p.type].color:'#789')+'"></span><span><span class="name">'+esc(p.name)+'</span><span class="meta">'+typeLabel(p.type)+' · 자원 '+p.resources.length+'개</span></span><span class="badge">'+linkCount(p.id)+'</span></button>'}).join('');people.querySelectorAll('[data-select]').forEach(function(b){b.onclick=function(){state.selectedId=b.dataset.select;render()}})}
function renderMap(){svg.innerHTML='';state.links.forEach(function(l){var f=state.people.find(function(p){return p.id===l.from}),t=state.people.find(function(p){return p.id===l.to});if(!f||!t)return;var dx=t.x-f.x,dy=t.y-f.y,len=Math.hypot(dx,dy)||1,c=Math.min(80,len/5),mx=(f.x+t.x)/2-dy/len*c,my=(f.y+t.y)/2+dx/len*c,path=makeSvg('path',{d:'M '+f.x+' '+f.y+' Q '+mx+' '+my+' '+t.x+' '+t.y,class:'link '+l.type});path.onclick=function(e){e.stopPropagation();l.type=nextRelation(l.type);showToast('관계: '+relationTypes[l.type]);render()};svg.appendChild(path)});state.people.forEach(function(p){resourcePositions(p).forEach(function(item){svg.appendChild(makeSvg('path',{d:'M '+p.x+' '+p.y+' L '+item.x+' '+item.y,class:'resource-link'}))})});state.people.forEach(function(p){svg.appendChild(nodeFor(p))});state.people.forEach(function(p){resourcePositions(p).forEach(function(item){svg.appendChild(resourceNodeFor(p,item))})})}
function nodeFor(p){var r=p.type==='client'?58:52,g=makeSvg('g',{class:'node '+(p.id===state.selectedId?'selected':''),transform:'translate('+p.x+', '+p.y+')'});g.dataset.id=p.id;g.appendChild(makeSvg('circle',{class:'ring',r:r+8}));g.appendChild(makeSvg('circle',{r:r,fill:'#fff'}));g.appendChild(makeSvg('circle',{r:r-5,fill:'none',stroke:personTypes[p.type]?personTypes[p.type].color:'#789','stroke-width':4}));addSvgLabel(g,p.name,0,13,11);g.onpointerdown=startDrag;g.onclick=function(e){e.stopPropagation();nodeClick(p.id)};return g}
function resourcePositions(p){var ownerRadius=p.type==='client'?58:52;return p.resources.map(function(res,i){var n=p.resources.length,spread=Math.min(Math.PI*1.25,Math.PI*.42*Math.max(1,n-1)),base=-Math.PI/2,start=-spread/2,angle=base+(n===1?0:start+spread*i/(n-1)),dist=ownerRadius+70;return{resource:res,x:clamp(p.x+Math.cos(angle)*dist,55,945),y:clamp(p.y+Math.sin(angle)*dist,55,665)}})}
function resourceNodeFor(owner,item){var res=item.resource,tone=chipTone(res.type),g=makeSvg('g',{class:'resource-node '+tone,transform:'translate('+item.x+', '+item.y+')'});g.appendChild(makeSvg('circle',{r:37}));addSvgLabel(g,res.name,0,11,9);g.onclick=function(e){e.stopPropagation();state.selectedId=owner.id;showToast(owner.name+'의 자원: '+res.name);render()};return g}
function renderDetail(){var p=selectedPerson();detail.innerHTML='<section class="section"><div class="section-title"><span>인물 정보</span>'+(p.id==='client'?'':'<button class="mini" id="deletePerson" title="인물 삭제">×</button>')+'</div><div class="field"><label>이름</label><input id="personName" value="'+attr(p.name)+'"></div><div class="row"><div class="field"><label>분류</label><select id="personType">'+Object.keys(personTypes).map(function(v){return '<option value="'+v+'" '+(p.type===v?'selected':'')+'>'+personTypes[v].label+'</option>'}).join('')+'</select></div><div class="field"><label>메모</label><input id="personNote" value="'+attr(p.note||'')+'"></div></div></section><section class="section"><div class="section-title">이 인물의 자원 추가</div><div class="row"><div class="field"><label>자원 종류</label><select id="resourceType">'+Object.keys(resourceTypes).map(function(v){return '<option value="'+v+'">'+resourceTypes[v].label+'</option>'}).join('')+'</select></div><div class="field"><label>자원 이름</label><input id="resourceName" placeholder="예: 정서적 지지"></div></div><div class="field"><label>내용</label><textarea id="resourceMemo" placeholder="자원이 어떻게 작동하는지 적어두세요."></textarea></div><button class="btn primary" id="addResource">자원 추가</button></section><section class="section"><div class="section-title">등록된 자원</div><div class="resource-list">'+(p.resources.length?p.resources.map(resourceCard).join(''):'<div class="empty">아직 등록된 자원이 없습니다. 클라이언트뿐 아니라 이 인물에게도 자원을 추가할 수 있습니다.</div>')+'</div></section><section class="section"><div class="section-title">관계</div><div class="field"><label>연결할 인물</label><select id="relationTarget">'+state.people.filter(function(t){return t.id!==p.id}).map(function(t){return '<option value="'+t.id+'">'+esc(t.name)+'</option>'}).join('')+'</select></div><div class="field"><label>관계 유형</label><select id="relationType">'+Object.keys(relationTypes).map(function(v){return '<option value="'+v+'">'+relationTypes[v]+'</option>'}).join('')+'</select></div><button class="btn" id="addRelation">관계 추가</button></section>';document.getElementById('personName').oninput=function(e){p.name=e.target.value||'이름 없음';renderPeople();renderMap()};document.getElementById('personType').onchange=function(e){p.type=e.target.value;render()};document.getElementById('personNote').oninput=function(e){p.note=e.target.value;renderPeople()};document.getElementById('addResource').onclick=addResource;document.getElementById('addRelation').onclick=addRelation;detail.querySelectorAll('[data-delete-resource]').forEach(function(b){b.onclick=function(){deleteResource(b.dataset.deleteResource)}});var del=document.getElementById('deletePerson');if(del)del.onclick=deleteSelectedPerson}
function resourceCard(r){var t=resourceTypes[r.type]||{label:'자원'};return '<div class="resource"><div class="resource-top"><div class="chip-row"><span class="chip '+chipTone(r.type)+'">'+t.label+'</span><strong>'+esc(r.name)+'</strong></div><button class="mini" data-delete-resource="'+r.id+'">×</button></div>'+(r.memo?'<p>'+esc(r.memo)+'</p>':'')+'</div>'}
function addPerson(type){var n=state.people.length,p={id:uid(),name:personTypes[type].label,type:type,note:'',x:500+Math.cos(n*1.7)*240,y:360+Math.sin(n*1.7)*200,resources:[]};state.people.push(p);state.links.push({id:uid(),from:'client',to:p.id,type:'normal'});state.selectedId=p.id;render()}function nodeClick(id){if(!connectMode){state.selectedId=id;render();return}if(!connectStart){connectStart=id;state.selectedId=id;showToast('연결할 두 번째 인물을 선택하세요.');render();return}if(connectStart!==id){upsertLink(connectStart,id,'normal');showToast('관계를 연결했습니다.')}connectStart=null;connectMode=false;state.selectedId=id;render()}
function addResource(){var p=selectedPerson(),type=document.getElementById('resourceType').value,name=document.getElementById('resourceName').value.trim(),memo=document.getElementById('resourceMemo').value.trim();if(!name){showToast('자원 이름을 입력하세요.');return}p.resources.push({id:uid(),type:type,name:name,memo:memo});render()}function deleteResource(id){var p=selectedPerson();p.resources=p.resources.filter(function(r){return r.id!==id});render()}function addRelation(){upsertLink(selectedPerson().id,document.getElementById('relationTarget').value,document.getElementById('relationType').value);render()}function upsertLink(from,to,type){var ex=state.links.find(function(l){return(l.from===from&&l.to===to)||(l.from===to&&l.to===from)});if(ex)ex.type=type;else state.links.push({id:uid(),from:from,to:to,type:type})}function deleteSelectedPerson(){var id=state.selectedId;if(id==='client')return;state.people=state.people.filter(function(p){return p.id!==id});state.links=state.links.filter(function(l){return l.from!==id&&l.to!==id});state.selectedId='client';render()}
function startDrag(e){if(connectMode)return;var id=e.currentTarget.dataset.id,p=state.people.find(function(x){return x.id===id}),pt=svgPoint(e);dragging={id:id,dx:pt.x-p.x,dy:pt.y-p.y};state.selectedId=id;svg.setPointerCapture(e.pointerId);render()}svg.addEventListener('pointermove',function(e){if(!dragging)return;var p=state.people.find(function(x){return x.id===dragging.id}),pt=svgPoint(e);p.x=clamp(pt.x-dragging.dx,80,920);p.y=clamp(pt.y-dragging.dy,80,640);renderPeople();renderMap()});svg.addEventListener('pointerup',function(){dragging=null});
document.getElementById('connectMode').onclick=function(){connectMode=!connectMode;connectStart=null;showToast(connectMode?'연결할 첫 번째 인물을 선택하세요.':'관계 연결을 종료했습니다.');render()};document.getElementById('arrange').onclick=function(){var c=state.people.find(function(p){return p.id==='client'});if(c){c.x=500;c.y=360}var others=state.people.filter(function(p){return p.id!=='client'});others.forEach(function(p,i){var a=Math.PI*2*i/Math.max(1,others.length)-Math.PI/2;p.x=500+Math.cos(a)*260;p.y=360+Math.sin(a)*210});render()};document.getElementById('reset').onclick=function(){state=initialState();render()};document.getElementById('save').onclick=function(){var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='ecomap-resource-map.json';a.click();URL.revokeObjectURL(url)};document.getElementById('load').onchange=function(e){var file=e.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(){try{var next=JSON.parse(reader.result);if(!Array.isArray(next.people)||!Array.isArray(next.links))throw new Error('bad');state=next;state.selectedId=state.selectedId||(state.people[0]&&state.people[0].id)||'client';render()}catch(err){showToast('불러올 수 없는 파일입니다.')}};reader.readAsText(file);e.target.value=''};
function addSvgLabel(group,text,y,fontSize,maxChars){var lines=splitLabel(text,maxChars||9).slice(0,2),base=y-(lines.length-1)*fontSize*.55;var label=makeSvg('text',{y:base});lines.forEach(function(line,i){var tspan=makeSvg('tspan',{x:0,dy:i===0?0:fontSize});tspan.textContent=line;label.appendChild(tspan)});group.appendChild(label)}function splitLabel(text,maxChars){text=String(text||'');if(text.length<=maxChars)return[text];var words=text.split(/\s+/);if(words.length>1){var lines=[''];words.forEach(function(w){var last=lines.length-1;if((lines[last]+' '+w).trim().length<=maxChars)lines[last]=(lines[last]+' '+w).trim();else lines.push(w)});return lines.map(function(line){return line.length>maxChars?line.slice(0,maxChars-1)+'...':line})}return[text.slice(0,maxChars),text.length>maxChars*2?text.slice(maxChars,maxChars*2-1)+'...':text.slice(maxChars)]}function svgPoint(e){var p=svg.createSVGPoint();p.x=e.clientX;p.y=e.clientY;return p.matrixTransform(svg.getScreenCTM().inverse())}function makeSvg(tag,attrs){var el=document.createElementNS('http://www.w3.org/2000/svg',tag);Object.keys(attrs).forEach(function(k){el.setAttribute(k,attrs[k])});return el}function typeLabel(type){return personTypes[type]?personTypes[type].label:'인물'}function chipTone(type){var t=resourceTypes[type]&&resourceTypes[type].tone;return t==='risk'?'risk':(t==='warn'?'warn':'')}function linkCount(id){return state.links.filter(function(l){return l.from===id||l.to===id}).length}function nextRelation(type){var order=['strong','normal','weak','stress'];return order[(order.indexOf(type)+1)%order.length]}function shortText(text,max){return text.length>max?text.slice(0,max-1)+'...':text}function clamp(v,min,max){return Math.max(min,Math.min(max,v))}function showToast(msg){toast.textContent=msg;toast.classList.add('show');clearTimeout(showToast.timer);showToast.timer=setTimeout(function(){toast.classList.remove('show')},1600)}function esc(v){return String(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}function attr(v){return esc(v)}render();
