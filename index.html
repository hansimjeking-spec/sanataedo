<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>생태도 그리기</title>
  <style>
    :root {
      --blue: #3478e5;
      --blue-dark: #245fbd;
      --blue-soft: #eaf2ff;
      --red: #eb493f;
      --green: #24a35a;
      --gold: #d6961d;
      --ink: #20242a;
      --muted: #6d7480;
      --line: #d9dde4;
      --soft: #f4f6f8;
      --panel: #ffffff;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      background: #eef1f5;
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      font-size: 14px;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    .app {
      height: 100vh;
      min-height: 680px;
      padding: 8px;
      display: grid;
      grid-template-columns: 350px minmax(540px, 1fr);
      gap: 8px;
    }

    .sidebar,
    .workspace {
      min-width: 0;
      background: var(--panel);
      border: 1px solid #cfd4dc;
      border-radius: 7px;
      box-shadow: 0 2px 8px rgba(31, 42, 55, .06);
    }

    .sidebar {
      padding: 10px;
      overflow-y: auto;
    }

    .app-title {
      margin: 0 0 10px;
      color: var(--blue);
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .section {
      margin-bottom: 14px;
    }

    .section-title {
      position: relative;
      margin: 0 0 10px;
      padding: 0 9px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 14px;
      font-weight: 800;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 7px;
    }

    .field {
      display: grid;
      gap: 5px;
      margin-bottom: 9px;
    }

    label {
      color: #313844;
      font-size: 12px;
      font-weight: 700;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 36px;
      padding: 7px 10px;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 5px;
      outline: none;
    }

    textarea {
      min-height: 58px;
      resize: vertical;
      line-height: 1.45;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(52, 120, 229, .12);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .btn {
      min-height: 34px;
      padding: 0 14px;
      color: #27313d;
      background: #f0f2f5;
      border: 1px solid transparent;
      border-radius: 5px;
      font-weight: 700;
      white-space: nowrap;
    }

    .btn:hover { background: #e5e8ed; }
    .btn.primary {
      color: #fff;
      background: var(--blue);
    }
    .btn.primary:hover { background: var(--blue-dark); }
    .btn.danger {
      color: #fff;
      background: var(--red);
    }
    .btn.danger:hover { background: #d83e35; }
    .btn.active {
      color: #fff;
      background: var(--green);
    }
    .btn.full { width: 100%; }
    .btn.small {
      min-height: 28px;
      padding: 0 9px;
      font-size: 12px;
    }

    .people-list,
    .resource-list {
      display: grid;
      gap: 6px;
    }

    .person-row {
      width: 100%;
      min-height: 45px;
      padding: 7px 9px;
      display: grid;
      grid-template-columns: 10px minmax(0, 1fr) auto;
      align-items: center;
      gap: 9px;
      text-align: left;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 5px;
    }

    .person-row:hover { background: #f8faff; }
    .person-row.active {
      border-color: var(--blue);
      background: var(--blue-soft);
    }

    .person-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .person-main { min-width: 0; }
    .person-name {
      display: block;
      overflow: hidden;
      font-size: 13px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .person-meta {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
    }

    .count {
      min-width: 24px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #526170;
      background: var(--soft);
      border-radius: 11px;
      font-size: 11px;
      font-weight: 700;
    }

    .selected-panel {
      padding: 9px;
      background: #fafbfc;
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    .resource-card {
      padding: 8px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 7px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 5px;
    }

    .resource-card strong {
      display: block;
      overflow: hidden;
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .resource-card span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
    }

    .delete-icon {
      width: 28px;
      height: 28px;
      padding: 0;
      color: var(--red);
      background: #fff;
      border: 1px solid #f0c6c2;
      border-radius: 5px;
      font-size: 17px;
      line-height: 1;
    }

    .empty {
      padding: 12px;
      color: var(--muted);
      background: #fff;
      border: 1px dashed #cbd1da;
      border-radius: 5px;
      font-size: 12px;
      line-height: 1.5;
    }

    .sidebar-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .workspace {
      display: grid;
      grid-template-rows: 52px minmax(0, 1fr) 30px;
      overflow: hidden;
    }

    .toolbar {
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .toolbar-spacer { flex: 1; }

    .stage {
      position: relative;
      min-height: 0;
      overflow: hidden;
      background: #fff;
    }

    #map {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      user-select: none;
    }

    .canvas-corner {
      position: absolute;
      width: 16px;
      height: 16px;
      pointer-events: none;
    }
    .canvas-corner.tl { top: 9px; left: 9px; border-top: 2px solid #222; border-left: 2px solid #222; }
    .canvas-corner.tr { top: 9px; right: 9px; border-top: 2px solid #222; border-right: 2px solid #222; }
    .canvas-corner.bl { bottom: 9px; left: 9px; border-bottom: 2px solid #222; border-left: 2px solid #222; }
    .canvas-corner.br { right: 9px; bottom: 9px; border-right: 2px solid #222; border-bottom: 2px solid #222; }

    .statusbar {
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: #737a85;
      border-top: 1px solid var(--line);
      background: #fff;
      font-size: 11px;
      white-space: nowrap;
    }

    .statusbar .legend {
      display: flex;
      gap: 12px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .legend-line {
      width: 21px;
      border-top: 3px solid #7c8a97;
    }
    .legend-line.strong { border-color: var(--green); border-top-width: 4px; }
    .legend-line.weak { border-color: var(--gold); border-top-style: dashed; }
    .legend-line.stress { border-color: var(--red); border-top-style: dotted; }

    .relation {
      fill: none;
      stroke: #7c8a97;
      stroke-width: 3;
      stroke-linecap: round;
      cursor: pointer;
    }
    .relation.strong { stroke: var(--green); stroke-width: 4; }
    .relation.weak { stroke: var(--gold); stroke-width: 2.5; stroke-dasharray: 8 8; }
    .relation.stress { stroke: var(--red); stroke-width: 3; stroke-dasharray: 3 7; }

    .resource-link {
      fill: none;
      stroke: #95a2af;
      stroke-width: 2;
      stroke-linecap: round;
    }

    .person-node,
    .resource-node { cursor: grab; }
    .person-node:active,
    .resource-node:active { cursor: grabbing; }

    .person-node .outer {
      fill: #fff;
      stroke-width: 4;
    }
    .person-node.client .outer { stroke: var(--blue); }
    .person-node.selected .select-ring {
      opacity: 1;
    }
    .select-ring {
      fill: none;
      stroke: rgba(52, 120, 229, .28);
      stroke-width: 8;
      opacity: 0;
    }
    .person-node text {
      fill: #20242a;
      text-anchor: middle;
      pointer-events: none;
    }
    .person-node .node-name {
      font-size: 14px;
      font-weight: 800;
    }
    .person-node .node-type {
      fill: #6d7480;
      font-size: 10px;
    }

    .resource-node .resource-circle {
      fill: #fff;
      stroke: #536d8a;
      stroke-width: 3;
    }
    .resource-node.good .resource-circle { stroke: var(--green); }
    .resource-node.warn .resource-circle { stroke: var(--gold); }
    .resource-node.risk .resource-circle { stroke: var(--red); }
    .resource-node text {
      fill: #20242a;
      text-anchor: middle;
      pointer-events: none;
    }
    .resource-node .resource-name {
      font-size: 12px;
      font-weight: 800;
    }
    .resource-node .resource-type {
      fill: #727985;
      font-size: 9px;
    }

    .toast {
      position: absolute;
      top: 14px;
      left: 50%;
      z-index: 3;
      max-width: calc(100% - 32px);
      padding: 8px 12px;
      color: #fff;
      background: rgba(31, 36, 43, .9);
      border-radius: 5px;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%);
      transition: opacity .16s ease;
      font-size: 12px;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 900px) {
      .app {
        height: auto;
        min-height: 100vh;
        grid-template-columns: 1fr;
      }
      .sidebar { max-height: none; }
      .workspace { height: 72vh; min-height: 580px; }
    }

    @media (max-width: 560px) {
      .app { padding: 0; gap: 0; }
      .sidebar,
      .workspace { border-radius: 0; }
      .row { grid-template-columns: 1fr; }
      .toolbar { padding: 7px; }
      .btn { padding: 0 10px; }
      .statusbar .legend { display: none; }
      .workspace { height: 68vh; min-height: 500px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1 class="app-title">생태도 정보 입력</h1>

      <section class="section">
        <h2 class="section-title">기본 정보</h2>
        <div class="field">
          <label for="mapTitle">생태도 제목</label>
          <input id="mapTitle" placeholder="예: 우리 가족 생태도">
        </div>
        <div class="field">
          <label for="clientName">중심 인물(Client) 이름</label>
          <input id="clientName" placeholder="중심 인물 이름">
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">주변 인물/조직 추가</h2>
        <div class="field">
          <label for="newPersonName">이름 또는 기관명</label>
          <input id="newPersonName" placeholder="예: 남편, 제천병원">
        </div>
        <div class="row">
          <div class="field">
            <label for="newPersonType">분류</label>
            <select id="newPersonType"></select>
          </div>
          <div class="field">
            <label for="newRelationType">관계</label>
            <select id="newRelationType"></select>
          </div>
        </div>
        <button class="btn primary full" id="addPerson">인물/조직 추가</button>
      </section>

      <section class="section">
        <h2 class="section-title">
          <span>내 생태도 목록</span>
          <span class="count" id="peopleCount">0</span>
        </h2>
        <div class="people-list" id="peopleList"></div>
      </section>

      <section class="section" id="selectedSection">
        <h2 class="section-title">
          <span>선택 항목 편집</span>
          <button class="btn danger small" id="deletePerson">삭제</button>
        </h2>
        <div class="selected-panel">
          <div class="field">
            <label for="selectedName">이름 또는 기관명</label>
            <input id="selectedName">
          </div>
          <div class="row">
            <div class="field">
              <label for="selectedType">분류</label>
              <select id="selectedType"></select>
            </div>
            <div class="field">
              <label for="selectedNote">메모</label>
              <input id="selectedNote" placeholder="관계나 역할">
            </div>
          </div>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">선택 항목의 자원 추가</h2>
        <div class="field">
          <label for="resourceName">자원 이름</label>
          <input id="resourceName" placeholder="예: 제천병원, 주거비 지원">
        </div>
        <div class="row">
          <div class="field">
            <label for="resourceType">자원 분류</label>
            <select id="resourceType"></select>
          </div>
          <div class="field">
            <label for="resourceMemo">내용</label>
            <input id="resourceMemo" placeholder="지원 내용">
          </div>
        </div>
        <button class="btn primary full" id="addResource">자원 추가</button>
        <div class="resource-list" id="resourceList" style="margin-top:8px"></div>
      </section>

      <div class="sidebar-actions">
        <button class="btn" id="loadButton">불러오기</button>
        <button class="btn danger" id="resetButton">전체 삭제</button>
      </div>
      <input id="loadInput" type="file" accept="application/json" hidden>
    </aside>

    <section class="workspace">
      <div class="toolbar">
        <button class="btn" id="newButton">새로 만들기</button>
        <button class="btn primary" id="saveButton">파일 저장</button>
        <button class="btn" id="connectButton">관계 연결</button>
        <button class="btn" id="arrangeButton">보기 정리</button>
        <span class="toolbar-spacer"></span>
        <button class="btn" id="imageButton">이미지 저장(PNG)</button>
      </div>

      <main class="stage" id="stage">
        <svg id="map" viewBox="0 0 1000 720" aria-label="생태도 작업판"></svg>
        <i class="canvas-corner tl"></i>
        <i class="canvas-corner tr"></i>
        <i class="canvas-corner bl"></i>
        <i class="canvas-corner br"></i>
        <div class="toast" id="toast"></div>
      </main>

      <footer class="statusbar">
        <span id="statusText">노드와 자원을 드래그하여 이동할 수 있습니다.</span>
        <span class="legend">
          <span class="legend-item"><i class="legend-line strong"></i>강한 지지</span>
          <span class="legend-item"><i class="legend-line"></i>일반 관계</span>
          <span class="legend-item"><i class="legend-line weak"></i>약한 관계</span>
          <span class="legend-item"><i class="legend-line stress"></i>갈등/부담</span>
        </span>
      </footer>
    </section>
  </div>

  <script>
    var personTypes = {
      client: { label: "클라이언트", color: "#3478e5" },
      family: { label: "가족", color: "#4d8f50" },
      friend: { label: "친구/지인", color: "#4079a8" },
      agency: { label: "기관/조직", color: "#a87816" },
      worker: { label: "전문가", color: "#7c5aa1" },
      neighbor: { label: "이웃/지역", color: "#b45f32" }
    };

    var resourceTypes = {
      emotional: { label: "정서 지원", tone: "good" },
      care: { label: "돌봄 지원", tone: "good" },
      money: { label: "경제 지원", tone: "good" },
      info: { label: "정보 제공", tone: "good" },
      place: { label: "공간/환경", tone: "good" },
      stress: { label: "부담 요인", tone: "warn" },
      risk: { label: "위험 요인", tone: "risk" }
    };

    var relationTypes = {
      strong: "강한 지지",
      normal: "일반 관계",
      weak: "약한 관계",
      stress: "갈등/부담"
    };

    var svg = document.getElementById("map");
    var toast = document.getElementById("toast");
    var dragging = null;
    var connectMode = false;
    var connectStart = null;

    function uid() {
      return crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random();
    }

    function initialState() {
      var husbandId = uid();
      var hospitalId = uid();
      var clientResourceId = uid();
      var husbandResourceId = uid();

      return normalizeState({
        title: "우리 가족 생태도",
        selectedId: "client",
        people: [
          {
            id: "client",
            name: "권경자",
            type: "client",
            note: "중심 인물",
            x: 500,
            y: 370,
            resources: [
              {
                id: clientResourceId,
                type: "care",
                name: "명지병원",
                memo: "진료와 건강관리",
                x: 755,
                y: 370
              }
            ]
          },
          {
            id: husbandId,
            name: "남편",
            type: "family",
            note: "배우자",
            x: 300,
            y: 370,
            resources: [
              {
                id: husbandResourceId,
                type: "care",
                name: "제천병원",
                memo: "남편의 의료 자원",
                x: 250,
                y: 155
              }
            ]
          },
          {
            id: hospitalId,
            name: "복지관 담당자",
            type: "worker",
            note: "사례관리",
            x: 540,
            y: 575,
            resources: []
          }
        ],
        links: [
          { id: uid(), from: "client", to: husbandId, type: "stress" },
          { id: uid(), from: "client", to: hospitalId, type: "strong" }
        ]
      });
    }

    function normalizeState(next) {
      next = next || {};
      next.title = next.title || "나의 생태도";
      next.people = Array.isArray(next.people) ? next.people : [];
      next.links = Array.isArray(next.links) ? next.links : [];

      if (!next.people.length) {
        next.people.push({
          id: "client",
          name: "Client",
          type: "client",
          note: "중심 인물",
          x: 500,
          y: 360,
          resources: []
        });
      }

      next.people.forEach(function(person, personIndex) {
        person.id = person.id || uid();
        person.type = personTypes[person.type] ? person.type : (personIndex === 0 ? "client" : "family");
        person.name = person.name || personTypes[person.type].label;
        person.x = Number.isFinite(person.x) ? person.x : 500;
        person.y = Number.isFinite(person.y) ? person.y : 360;
        person.resources = Array.isArray(person.resources) ? person.resources : [];

        person.resources.forEach(function(resource, resourceIndex) {
          resource.id = resource.id || uid();
          resource.type = resourceTypes[resource.type] ? resource.type : "info";
          resource.name = resource.name || "이름 없는 자원";
          if (!Number.isFinite(resource.x) || !Number.isFinite(resource.y)) {
            var pos = defaultResourcePosition(person, resourceIndex, person.resources.length);
            resource.x = pos.x;
            resource.y = pos.y;
          }
        });
      });

      if (!next.people.some(function(person) { return person.id === next.selectedId; })) {
        next.selectedId = next.people[0].id;
      }

      return next;
    }

    function loadLocalState() {
      try {
        var saved = localStorage.getItem("ecomap-drag-resource-state");
        return saved ? normalizeState(JSON.parse(saved)) : initialState();
      } catch (error) {
        return initialState();
      }
    }

    var state = loadLocalState();

    function saveLocalState() {
      localStorage.setItem("ecomap-drag-resource-state", JSON.stringify(state));
    }

    function selectedPerson() {
      return state.people.find(function(person) {
        return person.id === state.selectedId;
      }) || state.people[0];
    }

    function fillSelect(select, source, selectedValue, includeClient) {
      select.innerHTML = Object.keys(source)
        .filter(function(key) { return includeClient || key !== "client"; })
        .map(function(key) {
          return '<option value="' + key + '"' + (key === selectedValue ? " selected" : "") + ">" +
            escapeHtml(source[key].label || source[key]) + "</option>";
        })
        .join("");
    }

    function render() {
      renderForm();
      renderPeople();
      renderSelected();
      renderResources();
      renderMap();
      document.getElementById("connectButton").classList.toggle("active", connectMode);
      saveLocalState();
    }

    function renderForm() {
      document.getElementById("mapTitle").value = state.title;
      var client = state.people.find(function(person) { return person.type === "client"; }) || state.people[0];
      document.getElementById("clientName").value = client.name;
      fillSelect(document.getElementById("newPersonType"), personTypes, "family", false);
      fillSelect(document.getElementById("newRelationType"), relationTypes, "normal", true);
      fillSelect(document.getElementById("resourceType"), resourceTypes, "emotional", true);
    }

    function renderPeople() {
      var list = document.getElementById("peopleList");
      document.getElementById("peopleCount").textContent = state.people.length;
      list.innerHTML = state.people.map(function(person) {
        return '<button class="person-row ' + (person.id === state.selectedId ? "active" : "") +
          '" type="button" data-person-id="' + attr(person.id) + '">' +
          '<i class="person-dot" style="background:' + personTypes[person.type].color + '"></i>' +
          '<span class="person-main"><span class="person-name">' + escapeHtml(person.name) + '</span>' +
          '<span class="person-meta">' + escapeHtml(personTypes[person.type].label) +
          " · 자원 " + person.resources.length + "개</span></span>" +
          '<span class="count">' + linkCount(person.id) + "</span></button>";
      }).join("");

      list.querySelectorAll("[data-person-id]").forEach(function(button) {
        button.addEventListener("click", function() {
          state.selectedId = button.dataset.personId;
          render();
        });
      });
    }

    function renderSelected() {
      var person = selectedPerson();
      document.getElementById("selectedName").value = person.name;
      document.getElementById("selectedNote").value = person.note || "";
      fillSelect(document.getElementById("selectedType"), personTypes, person.type, true);
      document.getElementById("selectedType").disabled = person.type === "client";
      document.getElementById("deletePerson").style.visibility = person.type === "client" ? "hidden" : "visible";
    }

    function renderResources() {
      var person = selectedPerson();
      var list = document.getElementById("resourceList");
      list.innerHTML = person.resources.length ? person.resources.map(function(resource) {
        return '<div class="resource-card"><div><strong>' + escapeHtml(resource.name) +
          '</strong><span>' + escapeHtml(resourceTypes[resource.type].label) +
          (resource.memo ? " · " + escapeHtml(resource.memo) : "") +
          '</span></div><button class="delete-icon" type="button" title="자원 삭제" data-resource-delete="' +
          attr(resource.id) + '">×</button></div>';
      }).join("") : '<div class="empty">선택한 인물이나 기관에 등록된 자원이 없습니다.</div>';

      list.querySelectorAll("[data-resource-delete]").forEach(function(button) {
        button.addEventListener("click", function() {
          person.resources = person.resources.filter(function(resource) {
            return resource.id !== button.dataset.resourceDelete;
          });
          render();
        });
      });
    }

    function renderMap() {
      svg.innerHTML = "";

      state.links.forEach(function(link) {
        var from = personById(link.from);
        var to = personById(link.to);
        if (!from || !to) return;

        var path = makeSvg("path", {
          d: curvedPath(from.x, from.y, to.x, to.y),
          class: "relation " + link.type
        });
        path.addEventListener("click", function(event) {
          event.stopPropagation();
          link.type = nextRelation(link.type);
          showToast("관계: " + relationTypes[link.type]);
          render();
        });
        svg.appendChild(path);
      });

      state.people.forEach(function(person) {
        person.resources.forEach(function(resource) {
          svg.appendChild(makeSvg("path", {
            d: "M " + person.x + " " + person.y + " L " + resource.x + " " + resource.y,
            class: "resource-link"
          }));
        });
      });

      state.people.forEach(function(person) {
        svg.appendChild(personNode(person));
      });

      state.people.forEach(function(person) {
        person.resources.forEach(function(resource) {
          svg.appendChild(resourceNode(person, resource));
        });
      });
    }

    function personNode(person) {
      var radius = person.type === "client" ? 58 : 52;
      var group = makeSvg("g", {
        class: "person-node " + (person.type === "client" ? "client " : "") +
          (person.id === state.selectedId ? "selected" : ""),
        transform: "translate(" + person.x + " " + person.y + ")"
      });
      group.dataset.personId = person.id;
      group.appendChild(makeSvg("circle", { class: "select-ring", r: radius + 7 }));
      group.appendChild(makeSvg("circle", {
        class: "outer",
        r: radius,
        stroke: personTypes[person.type].color
      }));
      addLabel(group, person.name, -3, "node-name", 10);
      var type = makeSvg("text", { y: 22, class: "node-type" });
      type.textContent = personTypes[person.type].label;
      group.appendChild(type);
      group.addEventListener("pointerdown", startPersonDrag);
      group.addEventListener("click", function(event) {
        event.stopPropagation();
        if (connectMode) {
          handleConnectClick(person.id);
        } else {
          state.selectedId = person.id;
          render();
        }
      });
      return group;
    }

    function resourceNode(owner, resource) {
      var tone = resourceTypes[resource.type].tone;
      var group = makeSvg("g", {
        class: "resource-node " + tone,
        transform: "translate(" + resource.x + " " + resource.y + ")"
      });
      group.dataset.ownerId = owner.id;
      group.dataset.resourceId = resource.id;
      group.appendChild(makeSvg("circle", { class: "resource-circle", r: 44 }));
      addLabel(group, resource.name, -4, "resource-name", 9);
      var type = makeSvg("text", { y: 25, class: "resource-type" });
      type.textContent = resourceTypes[resource.type].label;
      group.appendChild(type);
      group.addEventListener("pointerdown", startResourceDrag);
      group.addEventListener("click", function(event) {
        event.stopPropagation();
        state.selectedId = owner.id;
        showToast(owner.name + "의 자원: " + resource.name);
        render();
      });
      return group;
    }

    function startPersonDrag(event) {
      if (connectMode) return;
      event.preventDefault();
      var person = personById(event.currentTarget.dataset.personId);
      var point = svgPoint(event);
      dragging = {
        kind: "person",
        personId: person.id,
        dx: point.x - person.x,
        dy: point.y - person.y,
        lastX: person.x,
        lastY: person.y
      };
      state.selectedId = person.id;
      svg.setPointerCapture(event.pointerId);
    }

    function startResourceDrag(event) {
      event.preventDefault();
      event.stopPropagation();
      var owner = personById(event.currentTarget.dataset.ownerId);
      var resource = resourceById(owner, event.currentTarget.dataset.resourceId);
      var point = svgPoint(event);
      dragging = {
        kind: "resource",
        ownerId: owner.id,
        resourceId: resource.id,
        dx: point.x - resource.x,
        dy: point.y - resource.y
      };
      state.selectedId = owner.id;
      svg.setPointerCapture(event.pointerId);
    }

    svg.addEventListener("pointermove", function(event) {
      if (!dragging) return;
      var point = svgPoint(event);

      if (dragging.kind === "person") {
        var person = personById(dragging.personId);
        var nextX = clamp(point.x - dragging.dx, 70, 930);
        var nextY = clamp(point.y - dragging.dy, 70, 650);
        var moveX = nextX - dragging.lastX;
        var moveY = nextY - dragging.lastY;
        person.x = nextX;
        person.y = nextY;
        person.resources.forEach(function(resource) {
          resource.x = clamp(resource.x + moveX, 50, 950);
          resource.y = clamp(resource.y + moveY, 50, 670);
        });
        dragging.lastX = nextX;
        dragging.lastY = nextY;
      } else {
        var owner = personById(dragging.ownerId);
        var resource = resourceById(owner, dragging.resourceId);
        resource.x = clamp(point.x - dragging.dx, 50, 950);
        resource.y = clamp(point.y - dragging.dy, 50, 670);
      }

      renderMap();
    });

    svg.addEventListener("pointerup", function() {
      if (!dragging) return;
      dragging = null;
      saveLocalState();
      renderPeople();
      renderSelected();
      renderResources();
    });

    svg.addEventListener("pointercancel", function() {
      dragging = null;
    });

    function addPerson() {
      var nameInput = document.getElementById("newPersonName");
      var name = nameInput.value.trim();
      if (!name) {
        showToast("이름 또는 기관명을 입력해주세요.");
        nameInput.focus();
        return;
      }

      var type = document.getElementById("newPersonType").value;
      var relation = document.getElementById("newRelationType").value;
      var client = state.people.find(function(person) { return person.type === "client"; }) || state.people[0];
      var index = state.people.length;
      var angle = -Math.PI / 2 + (index - 1) * 1.35;
      var person = {
        id: uid(),
        name: name,
        type: type,
        note: "",
        x: clamp(client.x + Math.cos(angle) * 260, 80, 920),
        y: clamp(client.y + Math.sin(angle) * 210, 80, 640),
        resources: []
      };

      state.people.push(person);
      state.links.push({ id: uid(), from: client.id, to: person.id, type: relation });
      state.selectedId = person.id;
      nameInput.value = "";
      render();
    }

    function addResource() {
      var nameInput = document.getElementById("resourceName");
      var name = nameInput.value.trim();
      if (!name) {
        showToast("기관명 또는 자원 이름을 입력해주세요.");
        nameInput.focus();
        return;
      }

      var person = selectedPerson();
      var position = defaultResourcePosition(person, person.resources.length, person.resources.length + 1);
      person.resources.push({
        id: uid(),
        type: document.getElementById("resourceType").value,
        name: name,
        memo: document.getElementById("resourceMemo").value.trim(),
        x: position.x,
        y: position.y
      });

      nameInput.value = "";
      document.getElementById("resourceMemo").value = "";
      render();
    }

    function handleConnectClick(personId) {
      if (!connectStart) {
        connectStart = personId;
        state.selectedId = personId;
        showToast("연결할 두 번째 인물이나 기관을 선택하세요.");
        render();
        return;
      }

      if (connectStart !== personId) {
        upsertLink(connectStart, personId, "normal");
        showToast("관계를 연결했습니다.");
      }
      connectStart = null;
      connectMode = false;
      state.selectedId = personId;
      render();
    }

    function upsertLink(from, to, type) {
      var existing = state.links.find(function(link) {
        return (link.from === from && link.to === to) || (link.from === to && link.to === from);
      });
      if (existing) existing.type = type;
      else state.links.push({ id: uid(), from: from, to: to, type: type });
    }

    function arrangeMap() {
      var client = state.people.find(function(person) { return person.type === "client"; }) || state.people[0];
      client.x = 500;
      client.y = 360;
      var others = state.people.filter(function(person) { return person.id !== client.id; });
      others.forEach(function(person, index) {
        var angle = -Math.PI / 2 + Math.PI * 2 * index / Math.max(1, others.length);
        person.x = 500 + Math.cos(angle) * 285;
        person.y = 360 + Math.sin(angle) * 230;
      });
      state.people.forEach(function(person) {
        person.resources.forEach(function(resource, index) {
          var position = defaultResourcePosition(person, index, person.resources.length);
          resource.x = position.x;
          resource.y = position.y;
        });
      });
      render();
    }

    function deleteSelectedPerson() {
      var person = selectedPerson();
      if (person.type === "client") return;
      state.people = state.people.filter(function(item) { return item.id !== person.id; });
      state.links = state.links.filter(function(link) {
        return link.from !== person.id && link.to !== person.id;
      });
      state.selectedId = state.people[0].id;
      render();
    }

    function downloadJson() {
      saveLocalState();
      downloadBlob(
        new Blob([JSON.stringify(state, null, 2)], { type: "application/json" }),
        safeFilename(state.title || "생태도") + ".json"
      );
      showToast("생태도 파일을 저장했습니다.");
    }

    function exportPng() {
      var clone = svg.cloneNode(true);
      clone.setAttribute("width", "1600");
      clone.setAttribute("height", "1152");
      clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
      var style = document.createElementNS("http://www.w3.org/2000/svg", "style");
      style.textContent = Array.from(document.styleSheets).map(function(sheet) {
        try { return Array.from(sheet.cssRules).map(function(rule) { return rule.cssText; }).join("\n"); }
        catch (error) { return ""; }
      }).join("\n");
      clone.insertBefore(style, clone.firstChild);
      var serialized = new XMLSerializer().serializeToString(clone);
      var svgBlob = new Blob([serialized], { type: "image/svg+xml;charset=utf-8" });
      var url = URL.createObjectURL(svgBlob);
      var image = new Image();
      image.onload = function() {
        var canvas = document.createElement("canvas");
        canvas.width = 1600;
        canvas.height = 1152;
        var context = canvas.getContext("2d");
        context.fillStyle = "#ffffff";
        context.fillRect(0, 0, canvas.width, canvas.height);
        context.drawImage(image, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(url);
        canvas.toBlob(function(blob) {
          if (blob) downloadBlob(blob, safeFilename(state.title || "생태도") + ".png");
        }, "image/png");
      };
      image.src = url;
    }

    function loadJson(file) {
      var reader = new FileReader();
      reader.onload = function() {
        try {
          var next = normalizeState(JSON.parse(reader.result));
          if (!next.people.length) throw new Error("invalid");
          state = next;
          render();
          showToast("생태도 파일을 불러왔습니다.");
        } catch (error) {
          showToast("올바른 생태도 파일이 아닙니다.");
        }
      };
      reader.readAsText(file);
    }

    function defaultResourcePosition(person, index, count) {
      var baseAngle = -Math.PI / 2;
      var spread = Math.min(Math.PI * 1.35, Math.max(.7, count * .52));
      var angle = count <= 1
        ? baseAngle
        : baseAngle - spread / 2 + spread * index / Math.max(1, count - 1);
      var distance = person.type === "client" ? 145 : 135;
      return {
        x: clamp(person.x + Math.cos(angle) * distance, 50, 950),
        y: clamp(person.y + Math.sin(angle) * distance, 50, 670)
      };
    }

    function curvedPath(x1, y1, x2, y2) {
      var dx = x2 - x1;
      var dy = y2 - y1;
      var length = Math.hypot(dx, dy) || 1;
      var curve = Math.min(45, length / 8);
      var mx = (x1 + x2) / 2 - dy / length * curve;
      var my = (y1 + y2) / 2 + dx / length * curve;
      return "M " + x1 + " " + y1 + " Q " + mx + " " + my + " " + x2 + " " + y2;
    }

    function addLabel(group, text, y, className, maxChars) {
      var lines = splitLabel(text, maxChars).slice(0, 2);
      var label = makeSvg("text", {
        y: y - (lines.length - 1) * 7,
        class: className
      });
      lines.forEach(function(line, index) {
        var tspan = makeSvg("tspan", { x: 0, dy: index === 0 ? 0 : 14 });
        tspan.textContent = line;
        label.appendChild(tspan);
      });
      group.appendChild(label);
    }

    function splitLabel(value, maxChars) {
      var text = String(value || "");
      if (text.length <= maxChars) return [text];
      var words = text.split(/\s+/);
      if (words.length > 1) {
        var lines = [""];
        words.forEach(function(word) {
          var last = lines.length - 1;
          if ((lines[last] + " " + word).trim().length <= maxChars) {
            lines[last] = (lines[last] + " " + word).trim();
          } else {
            lines.push(word);
          }
        });
        return lines.map(function(line) {
          return line.length > maxChars ? line.slice(0, maxChars - 1) + "…" : line;
        });
      }
      return [
        text.slice(0, maxChars),
        text.length > maxChars * 2 ? text.slice(maxChars, maxChars * 2 - 1) + "…" : text.slice(maxChars)
      ];
    }

    function makeSvg(tag, attrs) {
      var element = document.createElementNS("http://www.w3.org/2000/svg", tag);
      Object.keys(attrs).forEach(function(key) {
        element.setAttribute(key, attrs[key]);
      });
      return element;
    }

    function svgPoint(event) {
      var point = svg.createSVGPoint();
      point.x = event.clientX;
      point.y = event.clientY;
      return point.matrixTransform(svg.getScreenCTM().inverse());
    }

    function personById(id) {
      return state.people.find(function(person) { return person.id === id; });
    }

    function resourceById(person, id) {
      return person.resources.find(function(resource) { return resource.id === id; });
    }

    function linkCount(id) {
      return state.links.filter(function(link) {
        return link.from === id || link.to === id;
      }).length;
    }

    function nextRelation(type) {
      var order = ["strong", "normal", "weak", "stress"];
      return order[(order.indexOf(type) + 1) % order.length];
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function safeFilename(value) {
      return String(value).replace(/[\\/:*?"<>|]/g, "_").trim() || "생태도";
    }

    function downloadBlob(blob, filename) {
      var url = URL.createObjectURL(blob);
      var anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = filename;
      anchor.click();
      setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(function() {
        toast.classList.remove("show");
      }, 1700);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function attr(value) {
      return escapeHtml(value);
    }

    document.getElementById("mapTitle").addEventListener("input", function(event) {
      state.title = event.target.value;
      saveLocalState();
    });

    document.getElementById("clientName").addEventListener("input", function(event) {
      var client = state.people.find(function(person) { return person.type === "client"; }) || state.people[0];
      client.name = event.target.value || "Client";
      renderPeople();
      renderMap();
      saveLocalState();
    });

    document.getElementById("selectedName").addEventListener("input", function(event) {
      selectedPerson().name = event.target.value || "이름 없음";
      renderPeople();
      renderMap();
      saveLocalState();
    });

    document.getElementById("selectedNote").addEventListener("input", function(event) {
      selectedPerson().note = event.target.value;
      saveLocalState();
    });

    document.getElementById("selectedType").addEventListener("change", function(event) {
      selectedPerson().type = event.target.value;
      render();
    });

    document.getElementById("addPerson").addEventListener("click", addPerson);
    document.getElementById("newPersonName").addEventListener("keydown", function(event) {
      if (event.key === "Enter") addPerson();
    });
    document.getElementById("addResource").addEventListener("click", addResource);
    document.getElementById("resourceName").addEventListener("keydown", function(event) {
      if (event.key === "Enter") addResource();
    });
    document.getElementById("deletePerson").addEventListener("click", deleteSelectedPerson);
    document.getElementById("arrangeButton").addEventListener("click", arrangeMap);

    document.getElementById("connectButton").addEventListener("click", function() {
      connectMode = !connectMode;
      connectStart = null;
      document.getElementById("statusText").textContent = connectMode
        ? "연결할 첫 번째 인물이나 기관을 선택하세요."
        : "노드와 자원을 드래그하여 이동할 수 있습니다.";
      render();
    });

    function clearState() {
      state = initialState();
      connectMode = false;
      connectStart = null;
      render();
      showToast("새 생태도를 만들었습니다.");
    }

    document.getElementById("newButton").addEventListener("click", clearState);
    document.getElementById("resetButton").addEventListener("click", clearState);
    document.getElementById("saveButton").addEventListener("click", downloadJson);
    document.getElementById("imageButton").addEventListener("click", exportPng);
    document.getElementById("loadButton").addEventListener("click", function() {
      document.getElementById("loadInput").click();
    });
    document.getElementById("loadInput").addEventListener("change", function(event) {
      var file = event.target.files[0];
      if (file) loadJson(file);
      event.target.value = "";
    });

    render();
  </script>
</body>
</html>
