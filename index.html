<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>생태도 만들기</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1 class="app-title">생태도 만들기</h1>

      <section class="section">
        <h2 class="section-title">기본 정보</h2>
        <div class="field">
          <label for="mapTitle">생태도 제목</label>
          <input id="mapTitle" placeholder="예: 우리 가족 생태도">
        </div>
        <div class="field">
          <label for="clientName">중심 인물(Client) 이름</label>
          <input id="clientName" placeholder="중심 인물 이름">
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">가족 구성원 추가</h2>
        <div class="field">
          <label for="newPersonName">이름</label>
          <input id="newPersonName" placeholder="예: 아버지, 큰누나">
        </div>
        <div class="row">
          <div class="field">
            <label for="newGender">가계도 기호</label>
            <select id="newGender"></select>
          </div>
          <div class="field">
            <label for="newRole">중심 인물과의 관계</label>
            <select id="newRole"></select>
          </div>
        </div>
        <div class="row compact-row">
          <div class="field">
            <label for="newBirthYear">출생연도</label>
            <input id="newBirthYear" inputmode="numeric" placeholder="예: 1967">
          </div>
          <label class="check-field">
            <input id="newDeceased" type="checkbox">
            <span>사망 표시</span>
          </label>
        </div>
        <button class="btn primary full" id="addPerson">가족 구성원 추가</button>
      </section>

      <section class="section">
        <h2 class="section-title">
          <span>가족 구성원</span>
          <span class="count" id="peopleCount">0</span>
        </h2>
        <div class="people-list" id="peopleList"></div>
      </section>

      <section class="section">
        <h2 class="section-title">
          <span>선택 인물 편집</span>
          <button class="btn danger small" id="deletePerson">삭제</button>
        </h2>
        <div class="selected-panel">
          <div class="field">
            <label for="selectedName">이름</label>
            <input id="selectedName">
          </div>
          <div class="row">
            <div class="field">
              <label for="selectedGender">가계도 기호</label>
              <select id="selectedGender"></select>
            </div>
            <div class="field">
              <label for="selectedRole">역할</label>
              <select id="selectedRole"></select>
            </div>
          </div>
          <div class="row compact-row">
            <div class="field">
              <label for="selectedBirthYear">출생연도</label>
              <input id="selectedBirthYear" inputmode="numeric">
            </div>
            <label class="check-field">
              <input id="selectedDeceased" type="checkbox">
              <span>사망 표시</span>
            </label>
          </div>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">선택 인물의 자원 추가</h2>
        <div class="field">
          <label for="resourceName">기관명 또는 자원 이름</label>
          <input id="resourceName" placeholder="예: 제천병원, 주거비 지원">
        </div>
        <div class="row">
          <div class="field">
            <label for="resourceType">자원 분류</label>
            <select id="resourceType"></select>
          </div>
          <div class="field">
            <label for="resourceMemo">지원 내용</label>
            <input id="resourceMemo" placeholder="예: 정기 진료">
          </div>
        </div>
        <button class="btn primary full" id="addResource">자원 추가</button>
        <div class="resource-list" id="resourceList"></div>
      </section>

      <div class="sidebar-actions">
        <button class="btn" id="loadButton">불러오기</button>
        <button class="btn danger" id="resetButton">전체 삭제</button>
      </div>
      <input id="loadInput" type="file" accept=".json,image/png,image/jpeg" hidden>
    </aside>

    <section class="workspace">
      <div class="toolbar">
        <button class="btn" id="newButton">새로 만들기</button>
        <button class="btn primary" id="saveButton">편집용 PNG 저장</button>
        <button class="btn" id="connectButton">관계 연결</button>
        <button class="btn danger" id="deleteLinkButton" disabled>관계 삭제</button>
        <button class="btn" id="arrangeButton">가계도 정렬</button>
        <span class="toolbar-spacer"></span>
        <button class="btn" id="imageButton">이미지 저장(PNG)</button>
      </div>

      <main class="stage">
        <svg id="map" viewBox="0 0 1100 760" aria-label="가계도 기반 생태도 작업판"></svg>
        <i class="canvas-corner tl"></i>
        <i class="canvas-corner tr"></i>
        <i class="canvas-corner bl"></i>
        <i class="canvas-corner br"></i>
        <div class="toast" id="toast"></div>
        <div class="quick-editor" id="quickEditor" hidden></div>
      </main>

      <footer class="statusbar">
        <span id="statusText">인물과 자원은 이동할 수 있고, 자원 오른쪽 아래 손잡이로 크기를 조절할 수 있습니다.</span>
        <span class="legend">
          <span class="legend-symbol square-symbol"></span>남성
          <span class="legend-symbol circle-symbol"></span>여성
          <span class="legend-symbol resource-symbol"></span>자원
        </span>
      </footer>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
